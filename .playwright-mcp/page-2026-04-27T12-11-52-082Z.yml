              - heading "Combat" [level=2] [ref=e1087]
              - paragraph [ref=e1088]: "When one or more fleets collide with a planet (either by flying into it or being swept by a moving planet), combat is resolved:"
              - list [ref=e1089]:
                - listitem [ref=e1090]: All arriving fleets are grouped by owner. Ships from the same owner are summed.
                - listitem [ref=e1091]: The largest attacking force fights the second largest. The difference in ships survives.
                - listitem [ref=e1092]:
                  - text: "If there is a surviving attacker:"

            - generic [ref=e981]:
              - heading "Overview" [level=2] [ref=e982]
              - paragraph [ref=e983]: Players start with a single home planet and compete to control the map by sending fleets to capture neutral and enemy planets. The board is a 100x100 continuous space with a sun at the center. Planets orbit the sun, comets fly through on elliptical trajectories, and fleets travel in straight lines. The game lasts 500 turns. The player with the most total ships (on planets + in fleets) at the end wins.
              - heading "Board Layout" [level=2] [ref=e984]
              - list [ref=e985]:
                - listitem [ref=e986]:
                  - strong [ref=e987]: Board
                  - text: ": 100x100 continuous space, origin at top-left."
                - listitem [ref=e988]:
                  - strong [ref=e989]: Sun
                  - text: ": Centered at (50, 50) with radius 10. Fleets that cross the sun are destroyed."
                - listitem [ref=e990]:
                  - strong [ref=e991]: Symmetry
                  - text: ": All planets and comets are placed with 4-fold mirror symmetry around the center:"
                  - code [ref=e992]: (x, y), (100-x, y), (x, 100-y), (100-x, 100-y)
                  - text: . This ensures fairness regardless of starting position.
              - heading "Planets" [level=2] [ref=e993]
              - paragraph [ref=e994]:
                - text: Each planet is represented as
                - code [ref=e995]: "[id, owner, x, y, radius, ships, production]"
                - text: .
              - list [ref=e996]:
                - listitem [ref=e997]:
                  - strong [ref=e998]: owner
                  - text: ": Player ID (0-3), or -1 for neutral."
                - listitem [ref=e999]:
                  - strong [ref=e1000]: radius
                  - text: ": Determined by production:"
                  - code [ref=e1001]: 1 + ln(production)
                  - text: . Higher production planets are physically larger.
                - listitem [ref=e1002]:
                  - strong [ref=e1003]: production
                  - text: ": Integer from 1 to 5. Each turn, an owned planet generates this many ships."
                - listitem [ref=e1004]:
                  - strong [ref=e1005]: ships
                  - text: ": Current garrison. Starts between 5 and 99 (skewed toward lower values)."
              - heading "Planet Types" [level=3] [ref=e1006]
              - list [ref=e1007]:
                - listitem [ref=e1008]:
                  - strong [ref=e1009]: Orbiting planets
                  - text: ": Planets whose"
                  - code [ref=e1010]: orbital_radius + planet_radius < 50
                  - text: rotate around the sun at a constant angular velocity (0.025-0.05 radians/turn, randomized per game). Use
                  - code [ref=e1011]: initial_planets
                  - text: and
                  - code [ref=e1012]: angular_velocity
                  - text: from the observation to predict their positions.
                - listitem [ref=e1013]:
                  - strong [ref=e1014]: Static planets
                  - text: ": Planets further from the center do not rotate."
              - paragraph [ref=e1015]: The map contains 20-40 planets (5-10 symmetric groups of 4). At least 3 groups are guaranteed to be static, and at least one group is guaranteed to be orbiting.
              - heading "Home Planets" [level=3] [ref=e1016]
              - paragraph [ref=e1017]: One symmetric group is randomly chosen as the starting planets. In a 2-player game, players start on diagonally opposite planets (Q1 and Q4). In a 4-player game, each player gets one planet from the group. Home planets start with 10 ships.
              - heading "Fleets" [level=2] [ref=e1018]
              - paragraph [ref=e1019]:
                - text: Each fleet is represented as
                - code [ref=e1020]: "[id, owner, x, y, angle, from_planet_id, ships]"
                - text: .
              - list [ref=e1021]:
                - listitem [ref=e1022]:
                  - strong [ref=e1023]: angle
                  - text: ": Direction of travel in radians."
                - listitem [ref=e1024]:
                  - strong [ref=e1025]: ships
                  - text: ": Number of ships in the fleet (does not change during travel)."
              - heading "Fleet Speed" [level=3] [ref=e1026]
              - paragraph [ref=e1027]: "Fleet speed scales with size on a logarithmic curve:"
              - code [ref=e1029]: speed = 1.0 + (maxSpeed - 1.0) * (log(ships) / log(1000)) ^ 1.5
              - list [ref=e1030]:
                - listitem [ref=e1031]: 1 ship moves at 1.0 units/turn.
                - listitem [ref=e1032]: Larger fleets move faster, approaching the maximum speed (default 6.0).
                - listitem [ref=e1033]: A fleet of ~500 ships moves at ~5, and ~1000 ships reaches the max.
              - heading "Fleet Movement" [level=3] [ref=e1034]
              - paragraph [ref=e1035]: "Fleets travel in a straight line at their computed speed each turn. A fleet is removed if it:"
              - list [ref=e1036]:
                - listitem [ref=e1037]: Goes out of bounds (leaves the 100x100 playing field).
                - listitem [ref=e1038]: Crosses the sun (path segment comes within the sun's radius).
                - listitem [ref=e1039]: Collides with any planet (path segment comes within the planet's radius). This triggers combat.
              - paragraph [ref=e1040]: Collision detection is continuous -- the entire path segment from old to new position is checked, not just the endpoint.
              - heading "Fleet Launch" [level=3] [ref=e1041]
              - paragraph [ref=e1042]:
                - text: "Each turn, your agent returns a list of moves:"
                - code [ref=e1043]: "[from_planet_id, direction_angle, num_ships]"
                - text: .
              - list [ref=e1044]:
                - listitem [ref=e1045]: You can only launch from planets you own.
                - listitem [ref=e1046]: You cannot launch more ships than the planet currently has.
                - listitem [ref=e1047]: The fleet spawns just outside the planet's radius in the given direction.
                - listitem [ref=e1048]: You can issue multiple launches from the same or different planets in a single turn.
              - heading "Comets" [level=2] [ref=e1049]
              - paragraph [ref=e1050]: Comets are temporary extra-solar objects that fly through the board on highly elliptical orbits around the sun. They spawn in groups of 4 (one per quadrant) at steps 50, 150, 250, 350, and 450.
              - list [ref=e1051]:
                - listitem [ref=e1052]:

                - strong [ref=e873]: Welcome to Orbit Wars!
                - text: Command the fleet. Conquer the void. Orbit Wars resurrects the ruthless strategy of the 2010 Planet Wars challenge with fresh, exciting mechanics. Launch massive swarms of ships across the solar system, outmaneuver your enemies, and claim absolute orbital supremacy.
